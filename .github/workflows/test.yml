name: Test Bot

on:
  push:
  workflow_dispatch:   # اجازه‌ی اجرای دستی از تب Actions

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run import check
        run: |
          python -c "import bot.core; import core.scrapers.engine; import core.excel.builder; print('✅ همه ماژول‌ها درست import شدند')"

      - name: Run test search
        run: python run.py test "شیر کم چرب"
        continue-on-error: true   # اگه اسکرپینگ از خارج جواب نداد، کل job قرمز نشه
